stages:
  - deploy

deploy:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]

  variables:
    MODEL: $[[ inputs.model ]]

  script:
    - echo "$K8S_CA_CERT" | base64 -d > ca.crt

    - kubectl config set-cluster mlops-cluster \
    -   --server="$K8S_URL" \
    -   --certificate-authority=ca.crt

    - kubectl config set-credentials github-deployer \
    -   --token="$K8S_TOKEN"

    - kubectl config set-context mlops \
    -   --cluster=mlops-cluster \
    -   --user=github-deployer \

    - kubectl config use-context mlops

    - kubectl apply -f ./k8s/models/$MODEL.yaml -n models

  when: manual
