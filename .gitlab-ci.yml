spec:
  inputs:
    model:
      description: 'model to deploy'
      default: good-model-nano
      options:
        - bad-model-image-repo-not-in-list
        - bad-model-image-version-not-in-list
        - bad-model-malicious-downloader-init-container-env
        - bad-model-malicious-verifier-init-container-command
        - bad-model-malicious-verifier-init-container-image
        - bad-model-image-no-init-containers
        - bad-model-image-no-verifier-init-container
        - bad-model-unsigned-image
        - bad-model-unsigned-weights
        - good-model-nano
        - good-model-small
---
include:
  - 'pipelines/gitlab/deploy.yml'

stages:
  - deploy
