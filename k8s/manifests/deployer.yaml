apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployer
  namespace: models
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer
  namespace: models
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - create
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer
  namespace: models
subjects:
  - kind: ServiceAccount
    name: deployer
    namespace: models
roleRef:
  kind: Role
  name: deployer
  apiGroup: rbac.authorization.k8s.io
