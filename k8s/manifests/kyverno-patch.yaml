spec:
  template:
    spec:
      containers:
      - name: kyverno
        env:
        - name: VAULT_ADDR
          valueFrom:
            secretKeyRef:
              key: VAULT_ADDR
              name: kyverno-vault-integration
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              key: VAULT_TOKEN
              name: kyverno-vault-integration
