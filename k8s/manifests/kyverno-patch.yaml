spec:
  template:
    spec:
      containers:
      - name: kyverno
        env:
        - name: VAULT_ADDR
          valueFrom:
            secretKeyRef:
              key: address
              name: kyverno-vault-creds
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: kyverno-vault-creds
        - name: MLIST_ADDR
          valueFrom:
            secretKeyRef:
              key: address
              name: kyverno-mlist-creds
