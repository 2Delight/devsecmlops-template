apiVersion: apps/v1
kind: Deployment
metadata:
  name: good-model
  labels:
    app: good-model
spec:
  replicas: 3
  selector:
    matchLabels:
      app: good-model
  template:
    metadata:
      labels:
        app: good-model
    spec:
      containers:
        - name: good-model
          image: olegdayo/example-service:latest
          ports:
            - containerPort: 8000
