apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: model-completeness-verifier
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-both-init-containers-present
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaces:
                - models
      validate:
        message: "Both weights-downloader and weights-verifier init containers are required"
        deny:
          conditions:
            any:
              - key: "{{ length(request.object.spec.template.spec.initContainers[?name=='weights-downloader']) }}"
                operator: LessThan
                value: 1
              - key: "{{ length(request.object.spec.template.spec.initContainers[?name=='weights-verifier']) }}"
                operator: LessThan
                value: 1
    - name: require-downloader-init-container
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaces:
                - models
      validate:
        message: "Model deployments must include downloader init container"
        pattern:
          spec:
            template:
              spec:
                initContainers:
                  - name: weights-downloader
                    image: amazon/aws-cli:2.34.44
                    volumeMounts:
                      - name: weights
                        mountPath: /weights
                    env:
                      - (name): AWS_ACCESS_KEY_ID
                        valueFrom:
                          secretKeyRef:
                            name: init-container-s3-creds
                            key: access_key
                      - (name): AWS_SECRET_ACCESS_KEY
                        valueFrom:
                          secretKeyRef:
                            name: init-container-s3-creds
                            key: secret_access_key
                      - (name): AWS_REGION
                        value: 'ru-central-1'
    - name: require-verifier-init-container
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaces:
                - models
      validate:
        message: "Model deployments must include verifier init container"
        pattern:
          spec:
            template:
              spec:
                initContainers:
                  - name: weights-verifier
                    image: ghcr.io/sigstore/cosign/cosign:v2.6.2
                    volumeMounts:
                      - name: weights
                        mountPath: /weights
                    env:
                      - (name): VAULT_ADDR
                        valueFrom:
                          secretKeyRef:
                            name: init-container-vault-creds
                            key: address
                      - (name): VAULT_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: init-container-vault-creds
                            key: token
                    command:
                      - cosign
