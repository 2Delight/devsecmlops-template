apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: model-completeness-verifier
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-init-containers
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaces:
                - models
      validate:
        message: "Model deployments must include downloader and verifier init containers"
        pattern:
          spec:
            template:
              spec:
                initContainers:
                  - (name): weights-downloader
                    image: amazon/aws-cli:2.34.44
                    volumeMounts:
                      - name: weights
                        mountPath: /weights
                    env:
                      - (name): AWS_ACCESS_KEY_ID
                        valueFrom:
                          secretKeyRef:
                            name: init-container-s3-creds
                            key: access_key
                      - (name): AWS_SECRET_ACCESS_KEY
                        valueFrom:
                          secretKeyRef:
                            name: init-container-s3-creds
                            key: secret_access_key
                      - (name): AWS_REGION
                        value: 'ru-central-1'
                  - (name): weights-verifier
                    image: ghcr.io/sigstore/cosign/cosign:v2.6.2
                    volumeMounts:
                      - name: weights
                        mountPath: /weights
                    env:
                      - (name): VAULT_ADDR
                        valueFrom:
                          secretKeyRef:
                            name: init-container-vault-creds
                            key: address
                      - (name): VAULT_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: init-container-vault-creds
                            key: token
                    command:
                      - cosign
                    args:
                      - verify-blob
                      - --key
                      - hashivault://signer
                      - --bundle
                      - /weights/yolov8n.json
                      - /weights/yolov8n.pt
