apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: models
spec:
  destination:
    namespace: models
    server: https://kubernetes.default.svc
  source:
    path: k8s/models
    repoURL: https://github.com/2Delight/devsecmlops-template
    targetRevision: HEAD
  sources: []
  project: default
