apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-model
  labels:
    app: bad-model
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bad-model
  template:
    metadata:
      labels:
        app: bad-model
    spec:
      containers:
        - name: bad-model
          image: olegdayo/example-service:v0.0.6
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 1
              memory: 256Mi
            limits:
              cpu: 4
              memory: 4Gi
