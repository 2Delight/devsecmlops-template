apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-model-unsigned-image
  labels:
    app: bad-model-unsigned-image
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bad-model-unsigned-image
  template:
    metadata:
      labels:
        app: bad-model-unsigned-image
    spec:
      containers:
        - name: bad-model-unsigned-image
          image: olegdayo/example-service:v2.0.1
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: weights
              mountPath: /weights
          resources:
            requests:
              cpu: 1
              memory: 256Mi
            limits:
              cpu: 4
              memory: 4Gi
      volumes:
        - name: weights
          emptyDir: {}
