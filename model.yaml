apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-model-no-init-containers
  labels:
    app: bad-model-no-init-containers
spec:
  ...
  template:
  ...
    spec:
      containers:
        - name: bad-model-no-init-containers
          image: olegdayo/example-service:v2.0.0
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 1
              memory: 256Mi
            limits:
              cpu: 4
              memory: 4Gi
