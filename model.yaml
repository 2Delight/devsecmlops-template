apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-model-no-verifier-init-container
  labels:
    app: bad-model-no-verifier-init-container
spec:
  ...
  template:
  ...
    spec:
      initContainers:
        - name: weights-downloader
        ...
      containers:
        - name: bad-model-no-verifier-init-container
          image: olegdayo/example-service:v2.0.0
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 1
              memory: 256Mi
            limits:
              cpu: 4
              memory: 4Gi
      volumes:
        - name: weights
          emptyDir: {}
