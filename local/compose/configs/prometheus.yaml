global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
        - localhost:9090

  - job_name: auth-service
    static_configs:
      - targets:
        - mlist-backend:2112

  - job_name: db-exporter
    static_configs:
      - targets:
        - db-exporter:9187
